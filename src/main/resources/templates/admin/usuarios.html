<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Gerenciar Usuários - PESCD</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<header>
    <h2>Sistema PESCD - Administrador</h2>
    <div>
        Logado como: <strong sec:authentication="name"></strong>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit">Sair</button>
        </form>
    </div>
</header>

<main class="container">
    <h1>Gerenciar Usuários</h1>

    <div th:if="${sucesso}" class="alert-sucesso" th:text="${sucesso}"></div>
    <div th:if="${erro}" class="alert-erro" th:text="${erro}"></div>

    <div style="margin-bottom: 20px;">
        <a th:href="@{/admin/usuarios/novo}" class="btn-primario">Novo Usuário</a>
    </div>

    <table class="tabela-padrao">
        <thead>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Username</th>
            <th>E-mail</th>
            <th>Perfil (Tipo)</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="usuario : ${usuarios}">
            <td th:text="${usuario.id}">1</td>
            <td th:text="${usuario.nomeCompleto}">Nome</td>
            <td th:text="${usuario.username}">User</td>
            <td th:text="${usuario.email}">email@ufscar.br</td>
            <td th:text="${usuario.class.simpleName}">Professor</td>
            <td style="display: flex; gap: 10px;">
                <a th:href="@{/admin/usuarios/{id}/editar(id=${usuario.id})}" class="btn-primario">Editar</a>

                <form th:action="@{/admin/usuarios/{id}/excluir(id=${usuario.id})}" method="post" style="margin:0;">
                    <button type="submit" class="btn-secundario" style="background-color: #dc3545; color: white;"
                            onclick="return confirm('Tem certeza que deseja excluir este usuário definitivamente?')">
                        Excluir
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Editar Usuário - PESCD</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<header>
    <h2>Sistema PESCD - Administrador</h2>
    <div>
        Logado como: <strong sec:authentication="name"></strong>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit">Sair</button>
        </form>
    </div>
</header>

<main class="container">

    <h1>Editar Usuário</h1>

    <div th:if="${erro}" class="alert-erro" th:text="${erro}"></div>

    <form th:action="@{/admin/usuarios/{id}/editar(id=${usuario.id})}" method="post" class="form-card">

        <div class="form-grupo">
            <label for="tipo">Perfil do Usuário</label>
            <input type="text" id="tipo" th:value="${usuario.class.simpleName}" disabled class="texto-mutado" />
            <small>O perfil não pode ser alterado após a criação.</small>
        </div>

        <div class="form-grupo">
            <label for="nomeCompleto">Nome Completo <span class="obrigatorio">*</span></label>
            <input type="text" id="nomeCompleto" name="nomeCompleto" th:value="${usuario.nomeCompleto}" required maxlength="100"/>
        </div>

        <div class="form-grupo">
            <label for="email">E-mail <span class="obrigatorio">*</span></label>
            <input type="email" id="email" name="email" th:value="${usuario.email}" required maxlength="100"/>
        </div>

        <div class="form-grupo">
            <label for="username">Username (Login) <span class="obrigatorio">*</span></label>
            <input type="text" id="username" name="username" th:value="${usuario.username}" required maxlength="100"/>
        </div>

        <div class="form-grupo">
            <label for="senha">Nova Senha</label>
            <input type="password" id="senha" name="senha" placeholder="Deixe em branco para não alterar"/>
        </div>

        <div class="form-acoes">
            <button type="submit" class="btn-primario">Salvar Alterações</button>
            <a th:href="@{/admin/usuarios}" class="btn-secundario">Cancelar</a>
        </div>

    </form>
</main>

</body>
</html>

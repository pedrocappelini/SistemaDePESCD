<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Minhas Ofertas - PESCD</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<header>
    <h2>Sistema PESCD - UFSCar</h2>
    <div>
        Logado como: <strong sec:authentication="name"></strong>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit">Sair</button>
        </form>
    </div>
</header>

<main class="container">

    <h1>Minhas Ofertas</h1>

    <div th:if="${#lists.isEmpty(inscricoes)}" class="alert-info">
        Você não está inscrito em nenhuma oferta no momento.
    </div>

    <table th:if="${not #lists.isEmpty(inscricoes)}" class="tabela-ofertas">
        <thead>
        <tr>
            <th>Nome da Oferta</th>
            <th>Semestre</th>
            <th>Início</th>
            <th>Fim</th>
            <th>Professor Responsável</th>
            <th>Status da Oferta</th>
            <th>Seu Status</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="inscricao : ${inscricoes}">

            <td th:text="${inscricao.oferta.nome}">Nome da oferta</td>
            <td th:text="${inscricao.oferta.semestre}">2026/1</td>
            <td th:text="${#temporals.format(inscricao.oferta.dataInicio, 'dd/MM/yyyy')}">01/01/2026</td>
            <td th:text="${#temporals.format(inscricao.oferta.dataFim, 'dd/MM/yyyy')}">01/07/2026</td>
            <td th:text="${inscricao.oferta.professorResponsavel.nomeCompleto}">Prof.</td>

            <td>
                <span th:text="${inscricao.oferta.status}"
                      th:class="'badge status-' + ${inscricao.oferta.status}">
                    EM_ANDAMENTO
                </span>
            </td>

            <td>
                <span th:text="${inscricao.status}"
                      th:class="'badge status-' + ${inscricao.status}">
                    NAO_ENVIADO
                </span>
            </td>

             <!-- Ações disponíveis conforme status -->
            <td>
                <!-- Botão aparece só se oferta EM_ANDAMENTO e aluno NAO_ENVIADO -->
                <a th:if="${inscricao.oferta.status.name() == 'EM_ANDAMENTO'
                           and inscricao.status.name() == 'NAO_ENVIADO'}"
                   th:href="@{/aluno/plano/enviar(ofertaId=${inscricao.oferta.id})}"
                   class="btn-primario">
                    Enviar Plano
                </a>
                <span th:if="${inscricao.status.name() != 'NAO_ENVIADO'}">—</span>
            </td>

        </tr>
        </tbody>
    </table>

</main>

</body>
</html>

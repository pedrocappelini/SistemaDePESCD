<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Nova Oferta - PESCD</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<header>
    <h2>Sistema PESCD - UFSCar</h2>
    <div>
        Logado como: <strong sec:authentication="name"></strong>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit">Sair</button>
        </form>
    </div>
</header>

<main class="container">

    <h1>Criar Nova Oferta</h1>

    <div th:if="${erro}" class="alert-erro" th:text="${erro}"></div>


    <form th:action="@{/secretario/ofertas/nova}" th:object="${oferta}" method="post" class="form-card">

        <div class="form-grupo">
            <label for="nome">Nome da Oferta <span class="opcional">(opcional)</span></label>
            <input type="text" id="nome" th:field="*{nome}"
                   placeholder="Se vazio, será gerado automaticamente"/>
            <small>Exemplo: PESCD 2026/1</small>
        </div>

        <div class="form-grupo">
            <label for="semestre">Semestre <span class="obrigatorio">*</span></label>
            <input type="text" id="semestre" th:field="*{semestre}"
                   placeholder="Ex: 2026/1" required/>
        </div>

        <div class="form-grupo">
            <label for="dataInicio">Data de Início <span class="obrigatorio">*</span></label>
            <input type="date" id="dataInicio" th:field="*{dataInicio}" required/>
        </div>

        <div class="form-grupo">
            <label for="dataFim">Data de Fim <span class="obrigatorio">*</span></label>
            <input type="date" id="dataFim" th:field="*{dataFim}" required/>
        </div>


        <div class="form-grupo">
            <label for="professorId">Professor Responsável <span class="obrigatorio">*</span></label>
            <select id="professorId" name="professorId" required>
                <option value="">-- Selecione um professor --</option>
                <option th:each="prof : ${professores}"
                        th:value="${prof.id}"
                        th:text="${prof.nomeCompleto}">
                    Nome do Professor
                </option>
            </select>
        </div>

        <div class="form-acoes">
            <button type="submit" class="btn-primario">Criar Oferta</button>
            <a th:href="@{/secretario/ofertas}" class="btn-secundario">Cancelar</a>
        </div>

    </form>
</main>

<script>
    document.querySelector('form').addEventListener('submit', function (e) {
        const inicio = document.getElementById('dataInicio').value;
        const fim = document.getElementById('dataFim').value;

        if (inicio && fim && fim <= inicio) {
            e.preventDefault();
            alert('A data de fim deve ser posterior à data de início.');
        }
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Ofertas - Secretário - PESCD</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<header>
    <h2>Sistema PESCD - Secretário</h2>
    <div>
        Logado como: <strong sec:authentication="name"></strong>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit">Sair</button>
        </form>
    </div>
</header>

<main class="container">
    <h1>Ofertas Cadastradas</h1>

    <div th:if="${sucesso}" class="alert-sucesso" th:text="${sucesso}"></div>
    <div th:if="${erro}" class="alert-erro" th:text="${erro}"></div>

    <div style="margin-bottom: 20px;">
        <a th:href="@{/secretario/ofertas/nova}" class="btn-primario">Criar Nova Oferta</a>
    </div>

    <table class="tabela-padrao">
        <thead>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Semestre</th>
            <th>Status</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="oferta : ${ofertas}">
            <td th:text="${oferta.id}">1</td>
            <td th:text="${oferta.nome}">PESCD - 2026/1</td>
            <td th:text="${oferta.semestre}">2026/1</td>
            <td th:text="${oferta.status}">EM_ANDAMENTO</td>
            <td>
                <a th:href="@{/secretario/ofertas/{id}/alunos(id=${oferta.id})}" class="btn-secundario">Gerenciar Alunos</a>
            </td>
        </tr>
        </tbody>
    </table>
</main>

</body>
</html>
